apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ocp420-hcp-pull-secret
  namespace: clusters
spec:
  encryptedData:
    .dockerconfigjson: REPLACE_WITH_SEALED_SECRET_OUTPUT
  template:
    metadata:
      name: ocp420-hcp-pull-secret
      namespace: clusters
    type: kubernetes.io/dockerconfigjson
---
# This is a SealedSecret that will be decrypted by the Sealed Secrets controller
#
# To create this sealed secret:
# 1. Create a temporary secret file with your pull secret:
#    oc create secret docker-registry ocp420-hcp-pull-secret \
#      --from-file=.dockerconfigjson=pull-secret.txt \
#      --namespace=clusters \
#      --dry-run=client -o yaml > pull-secret-temp.yaml
#
# 2. Seal the secret using kubeseal:
#    kubeseal --format=yaml < pull-secret-temp.yaml > base/pull-secret-sealed.yaml
#
# 3. Delete the temporary file:
#    rm pull-secret-temp.yaml
#
# 4. Commit the sealed secret to Git (safe to commit!)
#
# See scripts/seal-secrets.sh for an automated helper script

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ocp420-hcp-ssh-key
  namespace: clusters
spec:
  encryptedData:
    id_rsa.pub: REPLACE_WITH_SEALED_SECRET_OUTPUT
  template:
    metadata:
      name: ocp420-hcp-ssh-key
      namespace: clusters
    type: Opaque
---
# This is a SealedSecret that will be decrypted by the Sealed Secrets controller
#
# To create this sealed secret:
# 1. Create a temporary secret file with your SSH key:
#    oc create secret generic ocp420-hcp-ssh-key \
#      --from-file=id_rsa.pub=~/.ssh/ocp420-hcp.pub \
#      --namespace=clusters \
#      --dry-run=client -o yaml > ssh-key-temp.yaml
#
# 2. Seal the secret using kubeseal:
#    kubeseal --format=yaml < ssh-key-temp.yaml > base/ssh-key-sealed.yaml
#
# 3. Delete the temporary file:
#    rm ssh-key-temp.yaml
#
# 4. Commit the sealed secret to Git (safe to commit!)
#
# See scripts/seal-secrets.sh for an automated helper script

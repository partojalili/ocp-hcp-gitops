apiVersion: v1
kind: Secret
metadata:
  name: ocp420-hcp-pull-secret
  namespace: clusters
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: >-
    REPLACE_WITH_YOUR_BASE64_ENCODED_PULL_SECRET
---
# Download your pull secret from: https://console.redhat.com/openshift/install/pull-secret
# Then base64 encode it:
#   cat pull-secret.txt | base64 -w0
# And replace REPLACE_WITH_YOUR_BASE64_ENCODED_PULL_SECRET above

apiVersion: v1
kind: Secret
metadata:
  name: ocp420-hcp-ssh-key
  namespace: clusters
type: Opaque
stringData:
  id_rsa.pub: >-
    REPLACE_WITH_YOUR_SSH_PUBLIC_KEY
---
# Generate SSH key if you don't have one:
#   ssh-keygen -t rsa -b 4096 -f ~/.ssh/ocp420-hcp -N ""
# Then paste the contents of ~/.ssh/ocp420-hcp.pub above

version: '3.8'

services:
  mongodb:
    image: mongo:4.4
    container_name: nodejs-1-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: myapp
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - app-network

  app:
    build: .
    container_name: nodejs-1-app
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB: myapp
      HOSTDB: mongodb
      DBPORT: 27017
      PORT: 9091
    ports:
      - "9091:9091"
    depends_on:
      - mongodb
    networks:
      - app-network
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongodb_data:
  mongodb_config:

networks:
  app-network:
    driver: bridge

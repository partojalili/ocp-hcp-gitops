apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-dynamic-plugins
  namespace: rhdh-operator
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      - package: '@backstage/plugin-scaffolder-backend-module-github-dynamic@npm:^0.2.0'
        disabled: false
        pluginConfig:
          scaffolder:
            defaultAuthor:
              name: Red Hat Developer Hub
              email: developer-hub@redhat.com

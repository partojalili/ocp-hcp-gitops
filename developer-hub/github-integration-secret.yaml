apiVersion: v1
kind: Secret
metadata:
  name: backstage-github-secret
  namespace: rhdh-operator
type: Opaque
stringData:
  # IMPORTANT: Replace with your actual GitHub Personal Access Token
  # Token needs 'repo' scope (read/write access to repositories)
  # Create token at: https://github.com/settings/tokens/new
  GITHUB_TOKEN: "REPLACE_WITH_YOUR_GITHUB_TOKEN"
---
# Instructions to create GitHub Personal Access Token:
#
# 1. Go to https://github.com/settings/tokens/new
# 2. Name: "Developer Hub GitOps"
# 3. Expiration: Choose based on your security policy (90 days recommended)
# 4. Select scopes:
#    ✓ repo (Full control of private repositories)
#      ✓ repo:status
#      ✓ repo_deployment
#      ✓ public_repo
#      ✓ repo:invite
# 5. Click "Generate token"
# 6. Copy the token and replace REPLACE_WITH_YOUR_GITHUB_TOKEN above
# 7. Apply this secret: oc apply -f github-integration-secret.yaml
#
# Security Note:
# - Store this token securely
# - Never commit the actual token to git
# - Consider using Sealed Secrets for production
# - Rotate token periodically

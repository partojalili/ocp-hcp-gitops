# GitHub Integration Secret - Using Sealed Secrets for Security
#
# This file provides instructions for creating a sealed GitHub token secret.
# Sealed Secrets encrypt secrets so they can be safely committed to git.
#
# Prerequisites:
# - Sealed Secrets controller must be installed on the cluster
# - kubeseal CLI must be installed locally
#
# Instructions:
#
# 1. Create GitHub Personal Access Token:
#    - Go to: https://github.com/settings/tokens/new
#    - Name: "Developer Hub GitOps"
#    - Expiration: 90 days (recommended)
#    - Required scope: ✓ repo (Full control of private repositories)
#    - Click "Generate token" and copy it
#
# 2. Create a temporary secret file (DO NOT commit this):
#    cat > /tmp/github-secret.yaml <<EOF
#    apiVersion: v1
#    kind: Secret
#    metadata:
#      name: backstage-github-secret
#      namespace: rhdh-operator
#    type: Opaque
#    stringData:
#      GITHUB_TOKEN: "ghp_YOUR_ACTUAL_TOKEN_HERE"
#    EOF
#
# 3. Seal the secret (encrypt it for safe git storage):
#    kubeseal -f /tmp/github-secret.yaml \
#             -w developer-hub/github-integration-sealed-secret.yaml \
#             --controller-namespace sealed-secrets \
#             --controller-name sealed-secrets-controller
#
# 4. Clean up temporary file:
#    rm /tmp/github-secret.yaml
#
# 5. Apply the sealed secret to cluster:
#    oc apply -f developer-hub/github-integration-sealed-secret.yaml
#
# 6. Commit the sealed secret to git (safe - encrypted):
#    git add developer-hub/github-integration-sealed-secret.yaml
#    git commit -m "Add sealed GitHub token for Developer Hub"
#
# The sealed secret can ONLY be decrypted by the Sealed Secrets controller
# running on your cluster. Safe to commit to public/private git repos.
#
# To verify the secret was created:
#    oc get secret backstage-github-secret -n rhdh-operator
#
# Security Notes:
# - Never commit plain secrets to git
# - Sealed secrets are cluster-specific (can't be used on other clusters)
# - Rotate tokens periodically
# - Each cluster needs its own sealed secret

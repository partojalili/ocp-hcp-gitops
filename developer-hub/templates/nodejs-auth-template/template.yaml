apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nodejs-auth-template
  title: Node.js JWT Authentication App
  description: Create a new Node.js application with JWT authentication, MongoDB, and Keycloak integration. Apps are scaffolded to the ocp-hcp-gitops repository under /apps/ directory and automatically discovered by the catalog.
  tags:
    - nodejs
    - express
    - jwt
    - mongodb
    - authentication
    - recommended
spec:
  type: service

  parameters:
    - title: Application Information
      required:
        - name
        - description
      properties:
        name:
          title: Application Name
          type: string
          description: Name of your application (lowercase, alphanumeric, and hyphens)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
          ui:help: 'Example: my-auth-api, user-service'

        description:
          title: Description
          type: string
          description: Brief description of your application
          default: Node.js API with JWT authentication

        owner:
          title: Owner
          type: string
          description: Owner of the component
          default: user:default/guest

    - title: MongoDB Configuration
      required:
        - mongodbEnabled
      properties:
        mongodbEnabled:
          title: Enable MongoDB
          type: boolean
          description: Include MongoDB configuration and models
          default: true

        databaseName:
          title: Database Name
          type: string
          description: MongoDB database name
          default: myapp
          ui:help: 'Name of the MongoDB database'

    - title: Git Repository
      properties:
        repoUrl:
          title: Repository Location
          type: string
          description: GitHub repository (will create a PR in this repo)
          default: github.com?owner=partojalili&repo=ocp-hcp-gitops
          ui:help: 'The scaffolded app will be added to this repository via PR'

  steps:
    - id: fetch-base
      name: Fetch Base Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          mongodbEnabled: ${{ parameters.mongodbEnabled }}
          databaseName: ${{ parameters.databaseName }}
          repoUrl: ${{ parameters.repoUrl }}

    - id: publish
      name: Create Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: ${{ parameters.repoUrl }}
        branchName: add-${{ parameters.name }}-app
        title: "Add ${{ parameters.name }} application"
        description: |
          ## New Node.js Application

          - **Name**: ${{ parameters.name }}
          - **Description**: ${{ parameters.description }}
          - **MongoDB**: ${{ parameters.mongodbEnabled }}

          Created via Red Hat Developer Hub scaffolder template.

          **After merging this PR**, the component will automatically appear in the Developer Hub catalog.
        targetPath: apps/${{ parameters.name }}
        sourcePath: .

  output:
    links:
      - title: View Pull Request
        url: ${{ steps.publish.output.remoteUrl }}
    text:
      - title: Application Scaffolded Successfully
        content: |
          Your Node.js application **${{ parameters.name }}** has been scaffolded!

          **What's included:**
          - ✅ Express.js REST API
          - ✅ JWT Authentication
          - ✅ MongoDB Integration (optional)
          - ✅ Keycloak Support
          - ✅ Docker Configuration
          - ✅ Environment Configuration
          - ✅ Devfile for OpenShift Dev Spaces

          **Next steps:**
          1. **Review and merge the pull request** (link above)
          2. After merging, the component will automatically appear in the Developer Hub catalog
          3. Clone the repository and start developing
          4. Or click "Open in Dev Spaces" from the catalog to start coding immediately!

          Your API will be available at `http://localhost:9091`

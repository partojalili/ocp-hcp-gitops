apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nodejs-auth-template
  title: Node.js JWT Authentication App
  description: Create a new Node.js application with JWT authentication, MongoDB, and Keycloak integration
  tags:
    - nodejs
    - express
    - jwt
    - mongodb
    - authentication
    - recommended
spec:
  type: service

  parameters:
    - title: Application Information
      required:
        - name
        - description
      properties:
        name:
          title: Application Name
          type: string
          description: Name of your application (lowercase, alphanumeric, and hyphens)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
          ui:help: 'Example: my-auth-api, user-service'

        description:
          title: Description
          type: string
          description: Brief description of your application
          default: Node.js API with JWT authentication

        owner:
          title: Owner
          type: string
          description: Owner of the component
          default: user:default/guest

    - title: MongoDB Configuration
      required:
        - mongodbEnabled
      properties:
        mongodbEnabled:
          title: Enable MongoDB
          type: boolean
          description: Include MongoDB configuration and models
          default: true

        databaseName:
          title: Database Name
          type: string
          description: MongoDB database name
          default: myapp
          ui:help: 'Name of the MongoDB database'

    - title: Git Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - partojalili

  steps:
    - id: fetch-base
      name: Fetch Base Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          mongodbEnabled: ${{ parameters.mongodbEnabled }}
          databaseName: ${{ parameters.databaseName }}
          repoUrl: ${{ parameters.repoUrl }}

    - id: create-repo
      name: Create GitHub Repository
      action: github:repo:create
      input:
        repoUrl: ${{ parameters.repoUrl }}
        description: ${{ parameters.description }}
        repoVisibility: public

    - id: publish
      name: Push Code to Repository
      action: github:repo:push
      input:
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main

    - id: register
      name: Register Component
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['create-repo'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: View Repository
        url: ${{ steps['create-repo'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
    text:
      - title: Application Scaffolded Successfully
        content: |
          Your Node.js application **${{ parameters.name }}** has been scaffolded!

          **What's included:**
          - ✅ Express.js REST API
          - ✅ JWT Authentication
          - ✅ MongoDB Integration (optional)
          - ✅ Keycloak Support
          - ✅ Docker Configuration
          - ✅ Environment Configuration
          - ✅ Devfile for OpenShift Dev Spaces

          **Repository created:** ${{ steps['create-repo'].output.remoteUrl }}

          **Component registered:** The component is now available in the catalog!

          **Next steps:**
          1. Clone the repository: `git clone ${{ steps['create-repo'].output.remoteUrl }}.git`
          2. Configure environment variables in `.env`
          3. Run `npm install`
          4. Start the app: `npm run dev`
          5. Or click "Open in Dev Spaces" from the catalog to start coding immediately!

          Your API will be available at `http://localhost:9091`

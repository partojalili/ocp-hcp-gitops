schemaVersion: 2.2.0
metadata:
  name: ${{ values.name }}
  displayName: ${{ values.name }}
  description: ${{ values.description }}
  tags:
    - Node.js
    - Express
    - MongoDB
    - JWT
  projectType: Node.js
  language: JavaScript
  version: 1.0.0

components:
  - name: nodejs
    container:
      image: registry.redhat.io/devspaces/udi-rhel8:latest
      memoryLimit: 1Gi
      memoryRequest: 512Mi
      cpuLimit: 1000m
      cpuRequest: 200m
      mountSources: true
      sourceMapping: /projects
      endpoints:
        - name: nodejs
          targetPort: 9091
          exposure: public
          protocol: http
      env:
        - name: NODE_ENV
          value: development
        - name: PORT
          value: "9091"
        - name: MONGODB_URI
          value: "mongodb://admin:admin@mongodb:27017/${{ values.databaseName }}?authSource=admin"

commands:
  - id: install-dependencies
    exec:
      component: nodejs
      workingDir: ${PROJECT_SOURCE}
      commandLine: npm install
      group:
        kind: build
        isDefault: true

  - id: run-dev
    exec:
      component: nodejs
      workingDir: ${PROJECT_SOURCE}
      commandLine: npm run dev
      group:
        kind: run
        isDefault: true

  - id: run-start
    exec:
      component: nodejs
      workingDir: ${PROJECT_SOURCE}
      commandLine: npm start
      group:
        kind: run

  - id: test
    exec:
      component: nodejs
      workingDir: ${PROJECT_SOURCE}
      commandLine: npm test
      group:
        kind: test

events:
  postStart:
    - install-dependencies

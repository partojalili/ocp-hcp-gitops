apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${{ values.clusterName }}-hosted-cluster
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: ${{ values.repoUrl }}
    targetRevision: HEAD
    path: clusters/devhub/${{ values.clusterName }}/base
  destination:
    server: https://kubernetes.default.svc
    namespace: clusters-${{ values.clusterName }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: openshift-hcp-cluster-template
  title: OpenShift HCP Cluster
  description: Provision a new OpenShift Hosted Control Plane cluster on KubeVirt
  tags:
    - openshift
    - hypershift
    - hcp
    - kubernetes
    - kubevirt
spec:
  type: infrastructure

  parameters:
    - title: Cluster Configuration
      required:
        - clusterName
        - baseDomain
        - pullSecret
        - sshPublicKey
      properties:
        clusterName:
          title: Cluster Name
          type: string
          description: Name of the cluster (lowercase alphanumeric and hyphens only)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
          ui:help: 'Example: dev-cluster, prod-hcp-01'

        baseDomain:
          title: Base Domain
          type: string
          description: Base domain for the cluster (must match your management cluster's apps domain)
          ui:help: 'Get this from your management cluster: oc get ingresses.config.openshift.io cluster -o jsonpath={.spec.domain}'

        pullSecret:
          title: Pull Secret
          type: string
          description: Red Hat pull secret (JSON format from console.redhat.com)
          ui:widget: textarea
          ui:options:
            rows: 5
          ui:help: 'Paste your pull secret from https://console.redhat.com/openshift/install/pull-secret'

        sshPublicKey:
          title: SSH Public Key
          type: string
          description: SSH public key for node access (e.g., ssh-rsa AAAA...)
          ui:widget: textarea
          ui:options:
            rows: 3
          ui:help: 'Paste your SSH public key (contents of ~/.ssh/id_rsa.pub)'

    - title: Worker Node Configuration
      required:
        - workerReplicas
        - cpuCores
        - memoryGi
      properties:
        workerReplicas:
          title: Number of Worker Nodes
          type: integer
          description: Number of worker nodes to provision
          default: 2
          minimum: 1
          maximum: 10
          ui:help: 'Start with 2 workers, scale later if needed'

        cpuCores:
          title: CPU Cores per Worker
          type: integer
          description: Number of CPU cores for each worker node
          default: 4
          enum:
            - 2
            - 4
            - 8
            - 16
          ui:help: 'Each worker VM will have this many CPU cores'

        memoryGi:
          title: Memory per Worker (Gi)
          type: integer
          description: Memory in GiB for each worker node
          default: 8
          enum:
            - 4
            - 6
            - 8
            - 16
            - 32
            - 64
          ui:help: 'Each worker VM will have this much memory'

    - title: Git Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository URL
          type: string
          description: Git repository where cluster config will be stored
          default: https://github.com/partojalili/ocp-hcp-gitops.git
          ui:help: 'ArgoCD will sync from this repository'

  steps:
    - id: fetch-base
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          clusterName: ${{ parameters.clusterName }}
          baseDomain: ${{ parameters.baseDomain }}
          pullSecret: ${{ parameters.pullSecret }}
          sshPublicKey: ${{ parameters.sshPublicKey }}
          workerReplicas: ${{ parameters.workerReplicas }}
          cpuCores: ${{ parameters.cpuCores }}
          memoryGi: ${{ parameters.memoryGi }}
          repoUrl: ${{ parameters.repoUrl }}

    - id: publish
      name: Publish to GitHub
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=partojalili&repo=ocp-hcp-gitops
        branchName: add-cluster-${{ parameters.clusterName }}
        targetBranchName: main
        title: "Add HCP cluster: ${{ parameters.clusterName }}"
        description: |
          ## Cluster Configuration

          - **Cluster Name**: ${{ parameters.clusterName }}
          - **Workers**: ${{ parameters.workerReplicas }}
          - **CPU**: ${{ parameters.cpuCores }} cores
          - **Memory**: ${{ parameters.memoryGi }}Gi
          - **Domain**: ${{ parameters.baseDomain }}

          Provisioned via Red Hat Developer Hub
        targetPath: clusters/devhub/${{ parameters.clusterName }}
        update: true
        sourcePath: .
        gitAuthorName: Red Hat Developer Hub
        gitAuthorEmail: developer-hub@redhat.com

  output:
    links:
      - title: View Pull Request
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Track Deployment Status
        icon: dashboard
        url: https://console-openshift-console.${{ parameters.baseDomain }}/k8s/ns/clusters-${{ parameters.clusterName }}/hypershift.openshift.io~v1beta1~HostedCluster/${{ parameters.clusterName }}
      - title: ArgoCD Application
        icon: sync
        url: https://openshift-gitops-server-openshift-gitops.${{ parameters.baseDomain }}/applications/${{ parameters.clusterName }}-hosted-cluster
    text:
      - title: Cluster Provisioning Started
        content: |
          Your HCP cluster **${{ parameters.clusterName }}** has been submitted for provisioning!

          **Configuration:**
          - Cluster Name: ${{ parameters.clusterName }}
          - Base Domain: ${{ parameters.baseDomain }}
          - Worker Nodes: ${{ parameters.workerReplicas }}
          - CPU per Worker: ${{ parameters.cpuCores }} cores
          - Memory per Worker: ${{ parameters.memoryGi }}Gi

          **What happens next:**
          1. ✅ Pull request created with cluster configuration
          2. ⚠️ **REQUIRED: Seal the secrets before merging** (see instructions below)
          3. 🔀 Merge the PR after sealing secrets
          4. ⏳ ApplicationSet auto-detects new cluster (~30 seconds)
          5. ⏳ ArgoCD syncs and creates HostedCluster (~1-2 minutes)
          6. ⏳ Control plane pods deploy (~5 minutes)
          7. ⏳ Worker VMs are created (~5 minutes)
          8. ✅ Cluster fully available (~15-20 minutes total)

          **CRITICAL: Seal Secrets Before Merging**

          The PR contains plain-text secrets. Use the automated script to seal them:

          ```bash
          # Get the PR number from the link above, then run:
          cd ~/ocp-hcp-gitops
          ./scripts/seal-pr-secrets.sh <PR-NUMBER>

          # The script will:
          # ✅ Checkout the PR automatically
          # ✅ Extract and seal both secrets
          # ✅ Replace plain-text with sealed secrets
          # ✅ Show you what changed

          # Then commit and merge:
          git push
          gh pr merge --squash

          # ArgoCD ApplicationSet will auto-detect and deploy the cluster!
          ```

          **Example for this PR:**
          ```bash
          cd ~/ocp-hcp-gitops
          ./scripts/seal-pr-secrets.sh ${{ steps.publish.output.pullRequestNumber }}
          git push
          gh pr merge --squash
          # ArgoCD will auto-deploy!
          ```

          **Why seal secrets?**
          - ⚠️ Plain-text secrets in Git = security vulnerability
          - ✅ Sealed secrets can only be decrypted by your cluster
          - ✅ Safe to commit to public repositories
          - ✅ The script handles all complexity automatically

          **Monitor progress:**
          ```bash
          # Watch HostedCluster status
          oc get hostedcluster ${{ parameters.clusterName }} -n clusters-${{ parameters.clusterName }} -w

          # Check ArgoCD Application
          oc get application ${{ parameters.clusterName }}-hosted-cluster -n openshift-gitops

          # View worker VMs
          oc get vm -n clusters-${{ parameters.clusterName }}
          ```

          **Access your cluster when ready:**
          ```bash
          # Get kubeconfig
          oc get secret ${{ parameters.clusterName }}-admin-kubeconfig \
            -n clusters-${{ parameters.clusterName }} \
            -o jsonpath='{.data.kubeconfig}' | base64 -d > ${{ parameters.clusterName }}-kubeconfig

          # Login to new cluster
          export KUBECONFIG=${{ parameters.clusterName }}-kubeconfig
          oc whoami
          ```

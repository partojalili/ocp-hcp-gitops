apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: openshift-hcp-cluster-template
  title: OpenShift HCP Cluster
  description: Provision a new OpenShift Hosted Control Plane cluster on KubeVirt
  tags:
    - openshift
    - hypershift
    - hcp
    - kubernetes
    - kubevirt
spec:
  type: infrastructure

  parameters:
    - title: Cluster Configuration
      required:
        - clusterName
        - baseDomain
        - pullSecret
      properties:
        clusterName:
          title: Cluster Name
          type: string
          description: Name of the cluster (lowercase alphanumeric and hyphens only)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
          ui:help: 'Example: dev-cluster, prod-hcp-01'

        baseDomain:
          title: Base Domain
          type: string
          description: Base domain for the cluster (e.g., apps.cluster-abc.redhat.com)
          default: apps.cluster-q2pfv.dynamic2.redhatworkshops.io
          ui:help: 'The base domain for cluster DNS and routes'

        pullSecret:
          title: Pull Secret
          type: string
          description: Red Hat pull secret (JSON format from console.redhat.com)
          ui:widget: textarea
          ui:options:
            rows: 5
          ui:help: 'Paste your pull secret from https://console.redhat.com/openshift/install/pull-secret'

    - title: Worker Node Configuration
      required:
        - workerReplicas
        - cpuCores
        - memoryGi
      properties:
        workerReplicas:
          title: Number of Worker Nodes
          type: integer
          description: Number of worker nodes to provision
          default: 2
          minimum: 1
          maximum: 10
          ui:help: 'Start with 2 workers, scale later if needed'

        cpuCores:
          title: CPU Cores per Worker
          type: integer
          description: Number of CPU cores for each worker node
          default: 4
          enum:
            - 2
            - 4
            - 8
            - 16
          ui:help: 'Each worker VM will have this many CPU cores'

        memoryGi:
          title: Memory per Worker (Gi)
          type: integer
          description: Memory in GiB for each worker node
          default: 8
          enum:
            - 4
            - 8
            - 16
            - 32
            - 64
          ui:help: 'Each worker VM will have this much memory'

    - title: Git Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository URL
          type: string
          description: Git repository where cluster config will be stored
          default: https://github.com/partojalili/ocp-hcp-gitops.git
          ui:help: 'ArgoCD will sync from this repository'

  steps:
    - id: fetch-base
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          clusterName: ${{ parameters.clusterName }}
          baseDomain: ${{ parameters.baseDomain }}
          pullSecret: ${{ parameters.pullSecret }}
          workerReplicas: ${{ parameters.workerReplicas }}
          cpuCores: ${{ parameters.cpuCores }}
          memoryGi: ${{ parameters.memoryGi }}
          repoUrl: ${{ parameters.repoUrl }}

    - id: log
      name: Log cluster details
      action: debug:log
      input:
        message: |
          Cluster configuration created:
          - Name: ${{ parameters.clusterName }}
          - Domain: ${{ parameters.baseDomain }}
          - Workers: ${{ parameters.workerReplicas }}
          - CPU: ${{ parameters.cpuCores }} cores
          - Memory: ${{ parameters.memoryGi }}Gi

  output:
    text:
      - title: Cluster Configuration Created
        content: |
          Your HCP cluster configuration for **${{ parameters.clusterName }}** has been generated!

          **Configuration Details:**
          - Cluster Name: ${{ parameters.clusterName }}
          - Base Domain: ${{ parameters.baseDomain }}
          - Worker Nodes: ${{ parameters.workerReplicas }}
          - CPU per Worker: ${{ parameters.cpuCores }} cores
          - Memory per Worker: ${{ parameters.memoryGi }}Gi

          **IMPORTANT - Manual Step Required:**

          The cluster configuration files have been created but need to be committed to git manually.

          **Copy and run these commands in your terminal:**

          ```bash
          # 1. Save the generated files (they are in your Backstage workspace)
          # The files are located at: clusters/${{ parameters.clusterName }}/

          # 2. Navigate to your git repository
          cd /path/to/ocp-hcp-gitops

          # 3. Copy the generated cluster files
          # (You'll need to copy from Backstage output - files shown above)

          # 4. Add and commit to git
          git add clusters/${{ parameters.clusterName }}/
          git commit -m "Add HCP cluster: ${{ parameters.clusterName }}

          Cluster configuration:
          - Workers: ${{ parameters.workerReplicas }}
          - CPU: ${{ parameters.cpuCores }} cores
          - Memory: ${{ parameters.memoryGi }}Gi
          - Domain: ${{ parameters.baseDomain }}

          Provisioned via Developer Hub"

          # 5. Push to GitHub
          git push origin main
          ```

          **After pushing to git:**
          - ArgoCD will detect the new files in ~2-3 minutes
          - The HostedCluster and NodePool will be created automatically
          - Control plane pods deploy (~5 minutes)
          - Worker VMs created (~5 minutes)
          - Cluster fully available (~15-20 minutes total)

          **Monitor deployment:**
          ```bash
          oc get hostedcluster ${{ parameters.clusterName }} -n clusters-${{ parameters.clusterName }} -w
          ```

apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: openshift-hcp-cluster-template
  title: OpenShift HCP Cluster
  description: Provision a new OpenShift Hosted Control Plane cluster on KubeVirt
  tags:
    - openshift
    - hypershift
    - hcp
    - kubernetes
    - kubevirt
spec:
  owner: user:guest
  type: infrastructure

  parameters:
    - title: Cluster Configuration
      required:
        - clusterName
        - baseDomain
        - pullSecret
      properties:
        clusterName:
          title: Cluster Name
          type: string
          description: Name of the cluster (lowercase alphanumeric and hyphens only)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
          ui:help: 'Example: dev-cluster, prod-hcp-01'

        baseDomain:
          title: Base Domain
          type: string
          description: Base domain for the cluster (e.g., apps.cluster-abc.redhat.com)
          default: apps.cluster-q2pfv.dynamic2.redhatworkshops.io
          ui:help: 'The base domain for cluster DNS and routes'

        pullSecret:
          title: Pull Secret
          type: string
          description: Red Hat pull secret (JSON format from console.redhat.com)
          ui:widget: textarea
          ui:options:
            rows: 5
          ui:help: 'Paste your pull secret from https://console.redhat.com/openshift/install/pull-secret'

    - title: Worker Node Configuration
      required:
        - workerReplicas
        - cpuCores
        - memoryGi
      properties:
        workerReplicas:
          title: Number of Worker Nodes
          type: integer
          description: Number of worker nodes to provision
          default: 2
          minimum: 1
          maximum: 10
          ui:help: 'Start with 2 workers, scale later if needed'

        cpuCores:
          title: CPU Cores per Worker
          type: integer
          description: Number of CPU cores for each worker node
          default: 4
          enum:
            - 2
            - 4
            - 8
            - 16
          ui:help: 'Each worker VM will have this many CPU cores'

        memoryGi:
          title: Memory per Worker (Gi)
          type: integer
          description: Memory in GiB for each worker node
          default: 8
          enum:
            - 4
            - 8
            - 16
            - 32
            - 64
          ui:help: 'Each worker VM will have this much memory'

    - title: Git Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository URL
          type: string
          description: Git repository where cluster config will be stored
          default: https://github.com/partojalili/ocp-hcp-gitops.git
          ui:help: 'ArgoCD will sync from this repository'

  steps:
    - id: fetch-base
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          clusterName: ${{ parameters.clusterName }}
          baseDomain: ${{ parameters.baseDomain }}
          pullSecret: ${{ parameters.pullSecret }}
          workerReplicas: ${{ parameters.workerReplicas }}
          cpuCores: ${{ parameters.cpuCores }}
          memoryGi: ${{ parameters.memoryGi }}
          repoUrl: ${{ parameters.repoUrl }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        allowedHosts:
          - github.com
        description: OpenShift HCP cluster ${{ parameters.clusterName }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        sourcePath: ./
        targetPath: clusters/${{ parameters.clusterName }}
        commitMessage: |
          Add OpenShift HCP cluster: ${{ parameters.clusterName }}

          Cluster configuration:
          - Workers: ${{ parameters.workerReplicas }}
          - CPU: ${{ parameters.cpuCores }} cores
          - Memory: ${{ parameters.memoryGi }} Gi
          - Domain: ${{ parameters.baseDomain }}

          Provisioned via Red Hat Developer Hub

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        optional: true
        catalogInfoUrl: ${{ steps.publish.output.commitUrl }}

  output:
    links:
      - title: View Cluster Config in GitHub
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Track Deployment Status
        icon: dashboard
        url: https://console-openshift-console.apps.cluster-q2pfv.dynamic2.redhatworkshops.io/k8s/ns/clusters-${{ parameters.clusterName }}/hypershift.openshift.io~v1beta1~HostedCluster/${{ parameters.clusterName }}
      - title: ArgoCD Application
        icon: sync
        url: https://openshift-gitops-server-openshift-gitops.apps.cluster-q2pfv.dynamic2.redhatworkshops.io/applications/${{ parameters.clusterName }}-hosted-cluster
    text:
      - title: Next Steps
        content: |
          Your cluster **${{ parameters.clusterName }}** has been submitted for provisioning!

          **What happens next:**
          1. ArgoCD will detect the new configuration in ~2-3 minutes
          2. The HostedCluster and NodePool will be created
          3. Control plane pods will deploy (~5 minutes)
          4. Worker VMs will be created (~5 minutes)
          5. Cluster will be fully available (~15-20 minutes total)

          **Monitor progress:**
          - Check ArgoCD for sync status
          - Watch the HostedCluster resource
          - View worker VMs in OpenShift Virtualization console

          Run this command to monitor:
          ```bash
          oc get hostedcluster ${{ parameters.clusterName }} -n clusters-${{ parameters.clusterName }} -w
          ```

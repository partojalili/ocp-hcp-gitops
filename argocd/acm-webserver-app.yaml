apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: acm-webserver-app
  namespace: openshift-gitops
spec:
  project: default

  source:
    repoURL: https://github.com/partojalili/ocp-hcp-gitops.git
    targetRevision: main
    path: policies/webserver-app

  destination:
    server: https://kubernetes.default.svc
    namespace: open-cluster-management-policies

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Ignore ACM replicated policies in managed cluster namespaces
  # These are created automatically by ACM and should not be tracked
  ignoreDifferences:
    - group: policy.open-cluster-management.io
      kind: Policy
      jsonPointers:
        - /status
        - /metadata/labels
        - /metadata/ownerReferences

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hosted-clusters
  namespace: openshift-gitops
spec:
  generators:
    # Git generator to deploy multiple clusters from directories
    - git:
        repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
        revision: main
        directories:
          - path: overlays/*

  template:
    metadata:
      name: 'hcp-{{path.basename}}'
      labels:
        app.kubernetes.io/managed-by: argocd
        cluster-type: hosted-control-plane
    spec:
      project: default

      source:
        repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
        targetRevision: main
        path: '{{path}}'

      destination:
        server: https://kubernetes.default.svc
        namespace: clusters

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

      ignoreDifferences:
        - group: hypershift.openshift.io
          kind: HostedCluster
          jsonPointers:
            - /status
        - group: hypershift.openshift.io
          kind: NodePool
          jsonPointers:
            - /status

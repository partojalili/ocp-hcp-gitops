apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ocp420-hosted-cluster
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
    targetRevision: main
    path: overlays/production

  destination:
    server: https://kubernetes.default.svc
    namespace: clusters

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: hypershift.openshift.io
      kind: HostedCluster
      jsonPointers:
        - /status
    - group: hypershift.openshift.io
      kind: NodePool
      jsonPointers:
        - /status

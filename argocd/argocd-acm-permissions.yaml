apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-acm-policy-manager
rules:
  # ACM Policies
  - apiGroups:
      - policy.open-cluster-management.io
    resources:
      - policies
      - placementbindings
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch

  # ACM Placements
  - apiGroups:
      - cluster.open-cluster-management.io
    resources:
      - placements
      - placementdecisions
      - managedclustersetbindings
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch

  # HyperShift / Hosted Control Planes
  - apiGroups:
      - hypershift.openshift.io
    resources:
      - hostedclusters
      - nodepools
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch

  # Sealed Secrets
  - apiGroups:
      - bitnami.com
    resources:
      - sealedsecrets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch

  # Core Resources
  - apiGroups:
      - ""
    resources:
      - namespaces
      - secrets
      - configmaps
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-acm-policy-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-acm-policy-manager
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops

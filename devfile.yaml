schemaVersion: 2.2.0
metadata:
  name: nodejs
  displayName: nodejs
  description: Node.js API with JWT authentication
  tags:
    - Node.js
    - Express
    - MongoDB
    - JWT
  projectType: Node.js
  language: JavaScript
  version: 1.0.0

components:
  - name: nodejs
    container:
      image: registry.redhat.io/devspaces/udi-rhel8:latest
      memoryLimit: 1Gi
      memoryRequest: 512Mi
      cpuLimit: 1000m
      cpuRequest: 200m
      mountSources: true
      sourceMapping: /projects
      endpoints:
        - name: nodejs
          targetPort: 9091
          exposure: public
          protocol: http
      env:
        - name: NODE_ENV
          value: development
        - name: PORT
          value: "9091"

  - name: mongodb
    container:
      image: registry.redhat.io/rhel8/mongodb-42:latest
      memoryLimit: 512Mi
      memoryRequest: 256Mi
      mountSources: false
      endpoints:
        - name: mongodb
          targetPort: 27017
          exposure: internal
      env:
        - name: MONGODB_USER
          value: user
        - name: MONGODB_PASSWORD
          value: password
        - name: MONGODB_DATABASE
          value: myapp
        - name: MONGODB_ADMIN_PASSWORD
          value: admin

commands:
  - id: install-dependencies
    exec:
      component: nodejs
      workingDir: ${PROJECT_SOURCE}
      commandLine: npm install
      group:
        kind: build
        isDefault: true

  - id: run-dev
    exec:
      component: nodejs
      workingDir: ${PROJECT_SOURCE}
      commandLine: npm run dev
      group:
        kind: run
        isDefault: true

  - id: run-start
    exec:
      component: nodejs
      workingDir: ${PROJECT_SOURCE}
      commandLine: npm start
      group:
        kind: run

  - id: test
    exec:
      component: nodejs
      workingDir: ${PROJECT_SOURCE}
      commandLine: npm test
      group:
        kind: test

events:
  postStart:
    - install-dependencies

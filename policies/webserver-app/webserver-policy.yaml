apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-webserver-app
  namespace: open-cluster-management-policies
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    # Namespace
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-webserver-namespace
        spec:
          remediationAction: enforce
          severity: low
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: webserver-prod
    # ConfigMap
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-webserver-configmap
        spec:
          remediationAction: enforce
          severity: low
          namespaceSelector:
            include:
              - webserver-prod
          object-templates:
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: application-content
                  namespace: webserver-prod
                data:
                  application.html: "<!DOCTYPE html><html><head><title>Prod Environment - Auto Reload v1</title><style>body{font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#edf2f4}div{text-align:center;padding:40px 60px;border:2px solid#e63946;border-radius:12px;background:rgba(230,57,70,0.08)}.badge{display:inline-block;padding:6px 18px;border-radius:20px;background:#e63946;color:#fff;font-weight:bold;font-size:14px;margin-bottom:20px}h1{font-size:2.5em;margin:10px 0}p{color:#a8dadc;font-size:1.1em}</style></head><body><div><span class='badge'>Prod</span><h1>WebServer Application</h1><p>Environment: Prod &bull; Managed by ACM on ocp-hcp &bull; With Auto-Reload!</p></div></body></html>"
    # Deployment
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-webserver-deployment
        spec:
          remediationAction: enforce
          severity: low
          namespaceSelector:
            include:
              - webserver-prod
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: webserver
                  namespace: webserver-prod
                  labels:
                    app: webserver
                spec:
                  selector:
                    matchLabels:
                      app: webserver
                  replicas: 1
                  template:
                    metadata:
                      labels:
                        app: webserver
                      annotations:
                        configmap.reloader.stakater.com/reload: "application-content"
                        config-version: "4"
                    spec:
                      containers:
                        - name: httpd
                          image: registry.access.redhat.com/ubi9/httpd-24:latest
                          ports:
                            - containerPort: 8080
                              name: webserver
                          volumeMounts:
                            - mountPath: /var/www/html
                              name: application-content
                          resources:
                            requests:
                              memory: "128Mi"
                              cpu: "250m"
                            limits:
                              memory: "512Mi"
                              cpu: "500m"
                      volumes:
                        - configMap:
                            defaultMode: 420
                            name: application-content
                          name: application-content
    # Service
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-webserver-service
        spec:
          remediationAction: enforce
          severity: low
          namespaceSelector:
            include:
              - webserver-prod
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Service
                metadata:
                  name: webserver
                  namespace: webserver-prod
                  labels:
                    app: webserver
                spec:
                  ports:
                  - name: 8080-tcp
                    port: 8080
                    protocol: TCP
                    targetPort: 8080
                  selector:
                    app: webserver
                  sessionAffinity: None
                  type: ClusterIP
    # Route
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-webserver-route
        spec:
          remediationAction: enforce
          severity: low
          namespaceSelector:
            include:
              - webserver-prod
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: route.openshift.io/v1
                kind: Route
                metadata:
                  name: webserver
                  namespace: webserver-prod
                  labels:
                    app: webserver
                spec:
                  path: "/application.html"
                  port:
                    targetPort: 8080-tcp
                  tls:
                    termination: edge
                  to:
                    kind: Service
                    name: webserver
                    weight: 100
                  wildcardPolicy: None

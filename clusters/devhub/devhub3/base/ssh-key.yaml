apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: devhub3-ssh-key
  namespace: clusters-devhub3
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: hcp-secrets-store
    kind: ClusterSecretStore
  target:
    name: devhub3-ssh-key
    creationPolicy: Owner
  data:
    - secretKey: id_rsa.pub
      remoteRef:
        key: ocp-ssh-key
        property: ssh-publickey

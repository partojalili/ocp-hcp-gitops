apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: devhub2-pull-secret
  namespace: clusters-devhub2
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: hcp-secrets-store
    kind: ClusterSecretStore
  target:
    name: devhub2-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
  dataFrom:
    - extract:
        key: ocp-pull-secret

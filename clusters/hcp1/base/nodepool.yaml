apiVersion: hypershift.openshift.io/v1beta1
kind: NodePool
metadata:
  name: hcp1-workers
  namespace: clusters-hcp1
spec:
  # Reference to the HostedCluster
  clusterName: hcp1

  # Number of worker nodes
  replicas: 2

  # OCP 4.19 release image (must match HostedCluster)
  release:
    image: quay.io/openshift-release-dev/ocp-release:4.19.0-x86_64

  # Platform: KubeVirt
  platform:
    type: KubeVirt
    kubevirt:
      # VM compute resources
      compute:
        cores: 4
        memory: 8Gi

      # Root volume configuration
      rootVolume:
        persistent:
          size: 120Gi
          storageClass: ocs-external-storagecluster-ceph-rbd
        type: Persistent

      # Additional volumes (optional)
      # additionalVolumes:
      # - name: data
      #   persistent:
      #     size: 100Gi
      #     storageClass: ocs-storagecluster-ceph-rbd

      # Network interface (optional)
      networkInterfaceMultiqueue: Enable

  # Node management
  management:
    autoRepair: true
    replace:
      strategy: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
    upgradeType: Replace

  # Node labels (optional)
  nodeLabels:
    node-role.kubernetes.io/worker: ""

  # Node taints (optional)
  # taints:
  # - key: "workload"
  #   value: "production"
  #   effect: "NoSchedule"

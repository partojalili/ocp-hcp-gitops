apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gcp-cluster-pull-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: hcp-secrets-store
    kind: ClusterSecretStore
  target:
    name: gcp-cluster-pull-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: ocp-pull-secret

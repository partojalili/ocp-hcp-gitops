apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-installer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cluster-installer
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["create", "get", "list", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-installer
subjects:
- kind: ServiceAccount
  name: cluster-installer
roleRef:
  kind: Role
  name: cluster-installer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: install-gcp-cluster1
  labels:
    cluster-name: gcp-cluster1
    job-type: cluster-installer
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 7200  # 2 hour timeout
  template:
    metadata:
      labels:
        job: cluster-installer
    spec:
      serviceAccountName: cluster-installer
      restartPolicy: Never
      containers:
      - name: installer
        image: quay.io/openshift/origin-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail

          echo "======================================"
          echo "OpenShift Cluster Installation"
          echo "Cluster: gcp-cluster1"
          echo "Platform: GCP"
          echo "======================================"

          INSTALL_DIR="/tmp/installer"
          mkdir -p "${INSTALL_DIR}"
          cd "${INSTALL_DIR}"

          # Download openshift-install binary
          echo "Downloading openshift-install..."
          OPENSHIFT_VERSION="${OPENSHIFT_VERSION:-stable}"
          curl -sfL "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/${OPENSHIFT_VERSION}/openshift-install-linux.tar.gz" | tar xzf -
          chmod +x openshift-install

          # Create install-config.yaml
          echo "Creating install-config.yaml..."
          cat > install-config.yaml <<'EOF'
          
          EOF

          # Merge in pull secret
          echo "Merging pull secret..."
          PULL_SECRET=$(cat /secrets/pull-secret/.dockerconfigjson)
          cat install-config.yaml | sed "s|PULL_SECRET_PLACEHOLDER|${PULL_SECRET}|" > install-config-merged.yaml
          mv install-config-merged.yaml install-config.yaml

          # Merge in SSH public key
          echo "Merging SSH key..."
          SSH_KEY=$(cat /secrets/ssh-key/ssh-publickey)
          cat install-config.yaml | sed "s|SSH_KEY_PLACEHOLDER|${SSH_KEY}|" > install-config-merged.yaml
          mv install-config-merged.yaml install-config.yaml

          # Set GCP credentials
          export GOOGLE_CREDENTIALS=/secrets/gcp/service-account.json

          # Backup install-config
          cp install-config.yaml install-config.yaml.backup

          # Create cluster
          echo "Starting cluster installation..."
          echo "This will take approximately 30-40 minutes..."
          ./openshift-install create cluster --dir="${INSTALL_DIR}" --log-level=info || {
            echo "Installation failed. Check logs above."
            exit 1
          }

          # Save kubeconfig and credentials as secrets
          echo "Saving cluster credentials..."

          # Kubeconfig
          kubectl create secret generic gcp-cluster1-kubeconfig \
            --from-file=kubeconfig="${INSTALL_DIR}/auth/kubeconfig" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Kubeadmin password
          kubectl create secret generic gcp-cluster1-kubeadmin \
            --from-file=password="${INSTALL_DIR}/auth/kubeadmin-password" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Cluster metadata
          kubectl create configmap gcp-cluster1-metadata \
            --from-file=metadata.json="${INSTALL_DIR}/metadata.json" \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "======================================"
          echo "Installation completed successfully!"
          echo "======================================"
          echo ""
          echo "Cluster: gcp-cluster1"
          echo "Console URL: https://console-openshift-console.apps.gcp-cluster1.jdpff.gcp.redhatworkshops.io"
          echo "API URL: https://api.gcp-cluster1.jdpff.gcp.redhatworkshops.io:6443"
          echo ""
          echo "To access the cluster:"
          echo "  kubectl get secret gcp-cluster1-kubeconfig -o jsonpath='{.data.kubeconfig}' | base64 -d > kubeconfig"
          echo "  export KUBECONFIG=kubeconfig"
          echo "  oc get nodes"
          echo ""
          echo "Kubeadmin password:"
          echo "  kubectl get secret gcp-cluster1-kubeadmin -o jsonpath='{.data.password}' | base64 -d"
          echo "======================================"

        env:
        - name: OPENSHIFT_VERSION
          value: "4.20"

        volumeMounts:
        - name: gcp-credentials
          mountPath: /secrets/gcp
          readOnly: true
        - name: pull-secret
          mountPath: /secrets/pull-secret
          readOnly: true
        - name: ssh-key
          mountPath: /secrets/ssh-key
          readOnly: true

        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

      volumes:
      - name: gcp-credentials
        secret:
          secretName: gcp-cluster1-gcp-credentials
      - name: pull-secret
        secret:
          secretName: gcp-cluster1-pull-secret
      - name: ssh-key
        secret:
          secretName: gcp-cluster1-ssh-key
